title = "MH Bathymetry Reco setup"

[simulation]
xbounds = [0.0, 10.0]
timestep = 1e-3
nx =  100
tstart = 0
tinterval = 10
g = 9.81
kappa = 0.2
dealias = 1.5
scenario = "periodic"
bathymetry = "one_gaussian_small_domain_test"

[bathymetry]
parametrized = true
parameters = [3.5, 0.5]
npeaks = 1

[sampler]
parametrized = true
initial = [3.5, 0.5]
stepsize = 0.1
likelihood_var = 0.001
n_samples = 1000
burnin = 0

[observation]
path = "./data/toy_measurement/"
noise_var = 0.0

[output]
save = true
path = "./data/results/experiment_"