title = "MH Bathymetry Reco setup"

[simulation]
xbounds = [1.5, 15.0]
timestep = 1e-3
nx =  100
tend = 10
g = 9.81
kappa = 0.2
dealias = 1.5
scenario = "waterchannel"

[sampler]
parametrized = true
initial = [0.0, 0.0]
stepsize = 0.1
likelihood_var = 0.001
n_samples = 1000
burnin = 0

[observation]
path = "./data/toy_measurement/simulation_data_waterchannel_one_gaussian.h5"
noise_var = 0.0

[output]
save = true
path = "./data/results/experiment_"