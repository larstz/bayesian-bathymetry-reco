title = "MH Bathymetry Reco setup"

[simulation]
xbounds = [1.5, 15.0]
timestep = 1e-3
nx =  100
tstart = 32
tinterval = 10
g = 9.81
kappa = 0.2
dealias = 1.5
sensor_position = [3.5, 5.5, 7.5] # must remain in between xbounds
scenario = "waterchannel" #supported are waterchannel and periodic
bathymetry = "exact_bathy" #supported are exact_bathy and gaussian

[bathymetry]
parametrized = true
parameters = [3.5, 0.5]
npeaks = 1

[sampler]
parametrized = true
initial = [3.0, 1.0]
stepsize = [0.1, 0.01]
likelihood_var = 0.001
n_samples = 1500
burnin = 0

[observation]
path = "./data/toy_measurement/"
noise_var = 1.0

[output]
save = true
path = "./data/results"