title = "MH Bathymetry Reco setup"

[simulation]
xbounds = [1.5, 15.0]
timestep = 1e-3
nx =  64
tstart = 32
tinterval = 10
g = 9.81
kappa = 0.2
dealias = 1.5
sensor_position = [3.5, 5.5, 7.5] # must remain in between xbounds
scenario = "waterchannel" #supported are waterchannel and periodic
bc_file = "./data/mean_bc.txt"
bathymetry = "exact_bathy" #supported are exact_bathy and gaussian

[bathymetry] # used to generate toy measurement
parametrized = true
parameters = [3.5, 0.5]
npeaks = 1

[sampler]
stepsize = [0.1, 0.01]
likelihood_var = 0.001
prior = ""
n_samples = 1000
n_chains = 5
burn_in = 0
initial = [[6.0, 1.0], [5.0, 1.0], [4.0, 1.0], [3.0, 1.0], [2.5, 1.0]]

[observation]
path = "./data/toy_measurement/waterchannel_exact_bathy"
real_data = false
noise_var = 0.05

[output]
save = true
path = "./data/results"
