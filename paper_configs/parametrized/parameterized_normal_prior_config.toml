title = "MH Bathymetry Reco setup"

[output]
save = true
path = "./data/results/paper_results/parametrized/"

[simulation]
xbounds = [1.5, 15.0]
dealias = 1.5
scenario = "waterchannel"
nx = 64
timestep = 0.01
kappa = 0.2
bathymetry = "exact_bathy"
sensor_position = [3.5, 5.5, 7.5]
tinterval = 10
g = 9.81
bc_file = "./data/mean_bc.txt"
tstart = 32

[observation]
real_data = false
sensor_rate = 0.01
noise_var = 0.05
sensor_id = [2, 3, 4]
path = "./data/toy_measurement/paper/waterchannel_exact_bathy/"

[sampler]
stepsize = [0.1, 0.01]
nx = 2
likelihood_var = 0.0
n_samples = 2000
burn_in = 0
initial = [[6.0, 0.5], [5.0, 0.5], [4.0, 0.5], [3.0, 0.5], [2.5, 0.5], [5.5, 0.5]]
n_chains = 6

    [sampler.proposal]
    type = "rw"


    [sampler.prior]
    loc = [4.0, 0.0] # loc for normal, loc for uniform is lower bound
    type = ["normal", "uniform"]
    scale = [0.1, 1.0] # scale for normal is std, scale for uniform is upper bound